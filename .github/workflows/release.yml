name: Build & Release

# Cuts a GitHub Release on each merged PR (release name = PR title, notes = PR body),
# and on manual dispatch. Builds the desktop app for macOS arm64/x86_64 and Linux x86_64.
on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  guard:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    steps:
      - run: echo "event=${{ github.event_name }}"

  build-macos-arm:
    needs: guard
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: oven-sh/setup-bun@v2
      - name: Build frontend
        working-directory: webapp/frontend
        run: bun install && bun run build
      - name: Build backend sidecar
        working-directory: webapp/backend
        run: |
          uv sync
          uv run --with pyinstaller pyinstaller rundiff_backend.spec \
            --noconfirm --distpath dist_backend --workpath build_backend
      - name: Build macOS app
        working-directory: webapp/desktop-macos
        env: { ARCH: arm64, VERSION: "${{ github.run_number }}" }
        run: |
          chmod +x build.sh && ./build.sh --dmg
          mkdir -p ../../out && cp "release/Run·Diff.dmg" "../../out/RunDiff-macOS-arm64.dmg"
      - uses: actions/upload-artifact@v4
        with: { name: macos-arm64, path: out/*.dmg, if-no-files-found: error }

  # Intel macOS runners can queue for a long time, so this is best-effort: the release does
  # not wait on it. The .dmg attaches whenever the runner is available in time.
  build-macos-intel:
    needs: guard
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: oven-sh/setup-bun@v2
      - name: Build frontend
        working-directory: webapp/frontend
        run: bun install && bun run build
      - name: Build backend sidecar
        working-directory: webapp/backend
        run: |
          uv sync
          uv run --with pyinstaller pyinstaller rundiff_backend.spec \
            --noconfirm --distpath dist_backend --workpath build_backend
      - name: Build macOS app
        working-directory: webapp/desktop-macos
        env: { ARCH: x86_64, VERSION: "${{ github.run_number }}" }
        run: |
          chmod +x build.sh && ./build.sh --dmg
          mkdir -p ../../out && cp "release/Run·Diff.dmg" "../../out/RunDiff-macOS-x86_64.dmg"
      - uses: actions/upload-artifact@v4
        with: { name: macos-x86_64, path: out/*.dmg, if-no-files-found: error }

  build-linux:
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Build frontend
        working-directory: webapp/frontend
        run: bun install && bun run build
      - name: Build backend sidecar
        working-directory: webapp/backend
        run: |
          uv sync
          uv run --with pyinstaller pyinstaller rundiff_backend.spec \
            --noconfirm --distpath dist_backend --workpath build_backend
      - name: Build Linux app
        working-directory: webapp/desktop
        run: npm install && npm run dist
      - name: Collect AppImage
        run: mkdir -p out && cp webapp/desktop/release/*.AppImage out/RunDiff-Linux-x86_64.AppImage
      - uses: actions/upload-artifact@v4
        with: { name: linux-x86_64, path: out/*.AppImage, if-no-files-found: error }

  release:
    needs: [build-macos-arm, build-linux]   # Intel is best-effort and intentionally not required
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts, merge-multiple: true }
      - name: Release metadata
        id: meta
        run: |
          echo "tag=v$(date -u +%Y.%m.%d).${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "name=${{ github.event.pull_request.title }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=Run·Diff v$(date -u +%Y.%m.%d).${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Release notes
        id: notes
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          {
            echo 'body<<EOF_NOTES'
            if [ "${{ github.event_name }}" = "pull_request" ] && [ -n "$PR_BODY" ]; then
              printf '%s\n' "$PR_BODY"
            else
              echo "Run·Diff desktop app (macOS arm64 / x86_64, Linux x86_64)."
            fi
            echo 'EOF_NOTES'
          } >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body: ${{ steps.notes.outputs.body }}
          files: artifacts/**/*
          fail_on_unmatched_files: false

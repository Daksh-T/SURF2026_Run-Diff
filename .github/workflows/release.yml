name: Build & Release

# Merged PRs promote the release-ready artifacts from PR Build. Manual dispatch still builds from
# source because there is no PR artifact set to promote.
on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: write

jobs:
  release-merged-pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    steps:
      - name: Download PR build artifacts
        uses: dawidd6/action-download-artifact@v11
        with:
          workflow: build.yml
          pr: ${{ github.event.pull_request.number }}
          workflow_conclusion: success
          path: artifacts
          merge_multiple: true
          if_no_artifact_found: fail
      - name: Release metadata
        id: meta
        run: |
          tag="v$(date -u +%Y.%m.%d).${{ github.run_number }}"
          {
            echo "tag=$tag"
            echo "name=Run·Diff $tag"
          } >> "$GITHUB_OUTPUT"
      - name: Release notes
        id: notes
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          {
            echo 'body<<EOF_NOTES'
            printf '%s\n\n%s\n' "$PR_TITLE" "$PR_URL"
            echo 'EOF_NOTES'
          } >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body: ${{ steps.notes.outputs.body }}
          files: artifacts/**/*
          fail_on_unmatched_files: true

  build-macos-arm:
    runs-on: macos-14
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { enable-cache: true }
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('webapp/frontend/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Build frontend
        working-directory: webapp/frontend
        run: bun install --frozen-lockfile && bun run build
      - name: Build backend sidecar
        working-directory: webapp/backend
        run: |
          uv sync
          uv run --with pyinstaller pyinstaller rundiff_backend.spec \
            --noconfirm --distpath dist_backend --workpath build_backend
      - name: Build macOS app
        working-directory: webapp/desktop-macos
        env: { ARCH: arm64, VERSION: "${{ github.run_number }}" }
        run: |
          chmod +x build.sh && ./build.sh --dmg
          mkdir -p ../../out && cp "release/Run·Diff.dmg" "../../out/RunDiff-macOS-arm64.dmg"
      - uses: actions/upload-artifact@v4
        with: { name: macos-arm64, path: out/*.dmg, if-no-files-found: error }

  build-linux:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { enable-cache: true }
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('webapp/frontend/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: webapp/desktop-tauri/src-tauri }
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: cargo-tauri-${{ runner.os }}-v2
      - name: Install WebKitGTK + bundling deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf
      - name: Build frontend
        working-directory: webapp/frontend
        run: bun install --frozen-lockfile && bun run build
      - name: Build backend sidecar
        working-directory: webapp/backend
        run: |
          uv sync
          uv run --with pyinstaller pyinstaller rundiff_backend.spec \
            --noconfirm --distpath dist_backend --workpath build_backend
      - name: Stage Tauri resources
        working-directory: webapp/desktop-tauri
        run: ./prep-resources.sh
      - name: Install Tauri CLI
        run: command -v cargo-tauri || cargo install tauri-cli --version "^2.0" --locked
      - name: Build Tauri bundle
        working-directory: webapp/desktop-tauri/src-tauri
        run: cargo tauri build --bundles appimage
      - name: Collect AppImage
        run: |
          mkdir -p out
          cp webapp/desktop-tauri/src-tauri/target/release/bundle/appimage/*.AppImage \
            out/RunDiff-Linux-x86_64.AppImage
      - uses: actions/upload-artifact@v4
        with: { name: linux-x86_64, path: out/*.AppImage, if-no-files-found: error }

  build-windows:
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { enable-cache: true }
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('webapp/frontend/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: webapp/desktop-tauri/src-tauri }
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri.exe
          key: cargo-tauri-${{ runner.os }}-v2
      - name: Build frontend
        working-directory: webapp/frontend
        shell: bash
        run: bun install --frozen-lockfile && bun run build
      - name: Build backend sidecar
        working-directory: webapp/backend
        shell: bash
        run: |
          uv sync
          uv run --with pyinstaller pyinstaller rundiff_backend.spec \
            --noconfirm --distpath dist_backend --workpath build_backend
      - name: Stage Tauri resources
        working-directory: webapp/desktop-tauri
        shell: bash
        run: ./prep-resources.sh
      - name: Install Tauri CLI
        shell: bash
        run: command -v cargo-tauri || cargo install tauri-cli --version "^2.0" --locked
      - name: Build Tauri bundle
        working-directory: webapp/desktop-tauri/src-tauri
        run: cargo tauri build
      - name: Collect Windows installers
        shell: bash
        run: |
          mkdir -p out
          cp webapp/desktop-tauri/src-tauri/target/release/bundle/msi/*.msi out/ 2>/dev/null || true
          cp webapp/desktop-tauri/src-tauri/target/release/bundle/nsis/*-setup.exe out/ 2>/dev/null || true
          ls -la out
      - uses: actions/upload-artifact@v4
        with: { name: windows-x86_64, path: out/*, if-no-files-found: error }

  release-manual:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    needs: [build-macos-arm, build-linux, build-windows]
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts, merge-multiple: true }
      - name: Release metadata
        id: meta
        run: |
          tag="v$(date -u +%Y.%m.%d).${{ github.run_number }}"
          {
            echo "tag=$tag"
            echo "name=Run·Diff $tag"
          } >> "$GITHUB_OUTPUT"
      - name: Release notes
        id: notes
        run: |
          {
            echo 'body<<EOF_NOTES'
            echo "Manual Run·Diff desktop release."
            echo 'EOF_NOTES'
          } >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body: ${{ steps.notes.outputs.body }}
          files: artifacts/**/*
          fail_on_unmatched_files: true

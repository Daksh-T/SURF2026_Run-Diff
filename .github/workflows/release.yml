name: Build & Release

# Every merged PR should release. When the PR build already has a complete artifact set, promote
# those files; otherwise rebuild all release targets and publish the regenerated artifacts.
on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: write

jobs:
  prepare-pr-artifacts:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    outputs:
      complete: ${{ steps.check.outputs.complete }}
    steps:
      - name: Download PR build artifacts
        id: download
        uses: dawidd6/action-download-artifact@v11
        continue-on-error: true
        with:
          workflow: build.yml
          pr: ${{ github.event.pull_request.number }}
          workflow_conclusion: success
          path: artifacts
          merge_multiple: true
          if_no_artifact_found: fail
      - name: Check artifact set
        id: check
        shell: bash
        run: |
          complete=false
          if [ "${{ steps.download.outcome }}" = "success" ] &&
             find artifacts -type f -name '*.dmg' -print -quit | grep -q . &&
             find artifacts -type f -name '*.AppImage' -print -quit | grep -q . &&
             find artifacts -type f -name '*.msi' -print -quit | grep -q . &&
             find artifacts -type f -name '*setup.exe' -print -quit | grep -q .; then
            complete=true
          fi
          echo "complete=$complete" >> "$GITHUB_OUTPUT"
      - name: Normalize promoted assets
        if: steps.check.outputs.complete == 'true'
        shell: bash
        run: |
          mkdir -p out
          cp "$(find artifacts -type f -name '*.dmg' | head -n 1)" out/RunDiff-macOS-arm64.dmg
          cp "$(find artifacts -type f -name '*.AppImage' | head -n 1)" out/RunDiff-Linux-x86_64.AppImage
          cp "$(find artifacts -type f -name '*.msi' | head -n 1)" out/RunDiff-Windows-x86_64.msi
          cp "$(find artifacts -type f -name '*setup.exe' | head -n 1)" out/RunDiff-Windows-x86_64-setup.exe
      - uses: actions/upload-artifact@v4
        if: steps.check.outputs.complete == 'true'
        with: { name: release-assets, path: out/*, if-no-files-found: error }

  build-macos-arm:
    needs: prepare-pr-artifacts
    if: always() && (github.event_name == 'workflow_dispatch' || needs.prepare-pr-artifacts.outputs.complete != 'true')
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { enable-cache: true }
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('webapp/frontend/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Build frontend
        working-directory: webapp/frontend
        run: bun install --frozen-lockfile && bun run build
      - name: Build backend sidecar
        working-directory: webapp/backend
        run: |
          uv sync
          uv run --with pyinstaller pyinstaller rundiff_backend.spec \
            --noconfirm --distpath dist_backend --workpath build_backend
      - name: Build macOS app
        working-directory: webapp/desktop-macos
        env: { ARCH: arm64, VERSION: "${{ github.run_number }}" }
        run: |
          chmod +x build.sh && ./build.sh --dmg
          mkdir -p ../../out && cp "release/Run·Diff.dmg" "../../out/RunDiff-macOS-arm64.dmg"
      - uses: actions/upload-artifact@v4
        with: { name: macos-arm64, path: out/*.dmg, if-no-files-found: error }

  build-linux:
    needs: prepare-pr-artifacts
    if: always() && (github.event_name == 'workflow_dispatch' || needs.prepare-pr-artifacts.outputs.complete != 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { enable-cache: true }
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('webapp/frontend/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: webapp/desktop-tauri/src-tauri }
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: cargo-tauri-${{ runner.os }}-v2
      - name: Install WebKitGTK + bundling deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf
      - name: Build frontend
        working-directory: webapp/frontend
        run: bun install --frozen-lockfile && bun run build
      - name: Build backend sidecar
        working-directory: webapp/backend
        run: |
          uv sync
          uv run --with pyinstaller pyinstaller rundiff_backend.spec \
            --noconfirm --distpath dist_backend --workpath build_backend
      - name: Stage Tauri resources
        working-directory: webapp/desktop-tauri
        run: ./prep-resources.sh
      - name: Install Tauri CLI
        run: command -v cargo-tauri || cargo install tauri-cli --version "^2.0" --locked
      - name: Build Tauri bundle
        working-directory: webapp/desktop-tauri/src-tauri
        run: cargo tauri build --bundles appimage
      - name: Collect AppImage
        run: |
          mkdir -p out
          cp webapp/desktop-tauri/src-tauri/target/release/bundle/appimage/*.AppImage \
            out/RunDiff-Linux-x86_64.AppImage
      - uses: actions/upload-artifact@v4
        with: { name: linux-x86_64, path: out/*.AppImage, if-no-files-found: error }

  build-windows:
    needs: prepare-pr-artifacts
    if: always() && (github.event_name == 'workflow_dispatch' || needs.prepare-pr-artifacts.outputs.complete != 'true')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { enable-cache: true }
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('webapp/frontend/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: webapp/desktop-tauri/src-tauri }
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri.exe
          key: cargo-tauri-${{ runner.os }}-v2
      - name: Build frontend
        working-directory: webapp/frontend
        shell: bash
        run: bun install --frozen-lockfile && bun run build
      - name: Build backend sidecar
        working-directory: webapp/backend
        shell: bash
        run: |
          uv sync
          uv run --with pyinstaller pyinstaller rundiff_backend.spec \
            --noconfirm --distpath dist_backend --workpath build_backend
      - name: Stage Tauri resources
        working-directory: webapp/desktop-tauri
        shell: bash
        run: ./prep-resources.sh
      - name: Install Tauri CLI
        shell: bash
        run: command -v cargo-tauri || cargo install tauri-cli --version "^2.0" --locked
      - name: Build Tauri bundle
        working-directory: webapp/desktop-tauri/src-tauri
        run: cargo tauri build
      - name: Collect Windows installers
        shell: bash
        run: |
          mkdir -p out
          cp webapp/desktop-tauri/src-tauri/target/release/bundle/msi/*.msi out/RunDiff-Windows-x86_64.msi
          cp webapp/desktop-tauri/src-tauri/target/release/bundle/nsis/*-setup.exe out/RunDiff-Windows-x86_64-setup.exe
          ls -la out
      - uses: actions/upload-artifact@v4
        with: { name: windows-x86_64, path: out/*, if-no-files-found: error }

  release:
    needs: [prepare-pr-artifacts, build-macos-arm, build-linux, build-windows]
    if: always() && (github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true) && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts, merge-multiple: true }
      - name: Verify release assets
        shell: bash
        run: |
          find artifacts -type f -maxdepth 2 -print
          test -n "$(find artifacts -type f -name '*.dmg' -print -quit)"
          test -n "$(find artifacts -type f -name '*.AppImage' -print -quit)"
          test -n "$(find artifacts -type f -name '*.msi' -print -quit)"
          test -n "$(find artifacts -type f -name '*setup.exe' -print -quit)"
      - name: Release metadata
        id: meta
        run: |
          tag="v$(date -u +%Y.%m.%d).${{ github.run_number }}"
          {
            echo "tag=$tag"
            echo "name=Run·Diff $tag"
          } >> "$GITHUB_OUTPUT"
      - name: Release notes
        id: notes
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          {
            echo 'body<<EOF_NOTES'
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              printf '%s\n\n%s\n' "$PR_TITLE" "$PR_URL"
            else
              echo "Manual Run·Diff desktop release."
            fi
            echo 'EOF_NOTES'
          } >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body: ${{ steps.notes.outputs.body }}
          files: artifacts/**/*
          fail_on_unmatched_files: true

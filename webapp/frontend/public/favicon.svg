<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Run·Diff favicon: a database wearing a graduation cap. The mortarboard rests on the
       database (no notch); the tassel drapes over the right edge and hangs down with a knot. The
       disk-separator lines are inset, round-capped smiles so they never overshoot the sides.
       Transparent ground (browser tab): ink database, paper rings, lime cap. Palette matches the
       app (ink #1a180f, lime #c4ec2b, paper #f4f0e6). -->

  <!-- database cylinder (ink) -->
  <g>
    <path d="M22 36.4 V49.5 A10 3.25 0 0 0 42 49.5 V36.4" fill="#1a180f"/>
    <ellipse cx="32" cy="36.4" rx="10" ry="3.25" fill="#1a180f"/>
    <!-- disk-separator smiles: inset from the sides + round caps → no side nubs -->
    <path d="M22.9 40.75 Q32 43.1 41.1 40.75" fill="none" stroke="#f4f0e6" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M22.9 45.1 Q32 47.5 41.1 45.1" fill="none" stroke="#f4f0e6" stroke-width="1.1" stroke-linecap="round"/>
  </g>

  <!-- graduation cap (lime mortarboard) resting on the database -->
  <g>
    <polygon points="32,15 51,24 32,33 13,24" fill="#c4ec2b" stroke="#1a180f" stroke-width="1.2" stroke-linejoin="round"/>
    <circle cx="32" cy="24" r="1.7" fill="#1a180f"/>
    <!-- tassel: drape over the right edge, hang down, knot at the end -->
    <path d="M32 24 Q45 25 47 28.5 L47 38.5" fill="none" stroke="#1a180f" stroke-width="1.3" stroke-linecap="round"/>
    <circle cx="47" cy="39.5" r="1.6" fill="#1a180f"/>
  </g>
</svg>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Run&middot;Diff</title>
    <style>
      :root { color-scheme: light; }
      html, body {
        margin: 0;
        height: 100%;
        background: #f4f0e6; /* warm-paper, matches the other shells' first paint */
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
        color: #4a4438;
        gap: 1.1rem;
        user-select: none;
      }
      .title { font-size: 1.4rem; font-weight: 600; letter-spacing: 0.01em; }
      .sub { font-size: 0.9rem; opacity: 0.7; }
      .spinner {
        width: 28px; height: 28px;
        border: 3px solid rgba(74, 68, 56, 0.2);
        border-top-color: #4a4438;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="spinner"></div>
    <div class="title">Run&middot;Diff</div>
    <div class="sub">Starting the tutor&hellip;</div>
  </body>
</html>
